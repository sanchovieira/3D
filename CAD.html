        .hero {

            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }

        /* CARROSSEL */
        .carousel {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: auto;
            overflow: hidden;
            border-radius: 20px;
        }

        .track {
            display: flex;
            transition: transform 0.6s ease;
        }

        .track img {
            flex: 0 0 100%;
            width: 100%;
            height: 600px;
            object-fit: contain;
            display: block;
        }

        .track img:hover {
            transform: scale(1.05);
            transition: transform 0.3s ease;
        }

        /* BOTÕES */
        .prev,
        .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 30px;
            border-radius: 10px;
            z-index: 999;
        }

        .prev { left: 10px; }
        .next { right: 10px; }

        /* MAPA */
        .map-iframe {
            filter: grayscale(100%);
        }
        </style>

    <!-- SLIDER JS -->
    <script>

    let index = 1;

    const track = document.getElementById("track");
    const images = document.querySelectorAll(".track img");

    function update() {
    const width = document.querySelector(".carousel").offsetWidth;
    track.style.transition = "transform 0.6s ease";
    track.style.transform = `translateX(-${index * width}px)`;
    }

    function nextSlide() {
    const width = document.querySelector(".carousel").offsetWidth;

    index++;
    update();

    if (index === images.length - 1) {
        setTimeout(() => {
            track.style.transition = "none";
            index = 1;
            track.style.transform = `translateX(-${width}px)`;
        }, 600);
    }
}

    function prevSlide() {
    const width = document.querySelector(".carousel").offsetWidth;

    index--;
    update();

    if (index === 0) {
        setTimeout(() => {
            track.style.transition = "none";
            index = images.length - 2;
            track.style.transform = `translateX(-${width * index}px)`;
        }, 600);
    }
    }

    window.addEventListener("load", update);
    window.addEventListener("resize", update);

    </script>
